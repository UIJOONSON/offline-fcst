<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LF Store KPI Dynamic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --surface: #FFFFFF;
            --secondary-light: #F3F3F3;
            --secondary-dark: #333333;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body { font-family: var(--font-main); background-color: var(--surface); color: var(--primary); margin: 0; padding: 30px; }
        h2 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        h3 { font-size: 18px; font-weight: 700; margin-bottom: 15px; }

        .table-container { overflow-x: auto; margin-bottom: 30px; border-top: 2px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background-color: var(--secondary-light); font-size: 11px; font-weight: 800; padding: 10px; border: 1px solid #ddd; }
        td { padding: 6px; border: 1px solid #eee; font-size: 13px; text-align: center; }

        input, select { font-family: var(--font-main); border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; text-align: center; }
        input:focus { outline: 2px solid var(--primary); }
        .input-full { width: 90%; }
        .input-target { font-weight: 700; background-color: #fffdec; }
        .input-readonly { background-color: #f5f5f5; color: #555; font-weight: 700; cursor: not-allowed; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .full-width-card { grid-column: span 2; }
        .bg-total { background-color: var(--primary) !important; color: var(--surface) !important; font-weight: 700; }
        .unit-label { text-align: right; font-size: 11px; color: #666; margin-bottom: 5px; }
        
        .actual-in { width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 2px; font-size: 11px; font-family: var(--font-main); }
        .rate-cell { font-weight: bold; font-size: 11px; }
        .rate-good { color: #2e7d32; }
        .rate-warning { color: #ed6c02; }
        .rate-danger { color: #d32f2f; }

        .delete-btn { background: none; border: none; color: #d32f2f; font-weight: 800; cursor: pointer; font-size: 13px; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 8px;">
        <h2>KPI Dynamic Dashboard</h2>
        <button onclick="resetAllData()" style="cursor: pointer; padding: 6px 15px; border-radius: 20px; border: 1px solid #d32f2f; background: #fff; color: #d32f2f; font-weight: bold; font-size: 12px;">데이터 초기화</button>
    </div>
    <div class="unit-label">단위: 백만 (KRW M)</div>

    <div class="table-container">
        <table id="mainKpiTable">
            <thead>
                <tr>
                    <th rowspan="2">매장명</th>
                    <th rowspan="2">Target</th>
                    <th rowspan="2">Total FCST</th>
                    <th rowspan="2">Total ACTUAL</th>
                    <th rowspan="2">달성율</th>
                    <th colspan="3">18주</th><th colspan="3">19주</th><th colspan="3">20주</th><th colspan="3">21주</th><th colspan="3">22주</th>
                </tr>
                <tr>
                    <th>FCST</th><th>ACTUAL</th><th>율</th>
                    <th>FCST</th><th>ACTUAL</th><th>율</th>
                    <th>FCST</th><th>ACTUAL</th><th>율</th>
                    <th>FCST</th><th>ACTUAL</th><th>율</th>
                    <th>FCST</th><th>ACTUAL</th><th>율</th>
                </tr>
            </thead>
            <tbody id="kpiBody"></tbody>
            <tfoot>
                <tr class="bg-total">
                    <td>TOTAL SUM</td>
                    <td id="totalTarget">0</td>
                    <td id="totalFcstSum">0</td>
                    <td id="totalActualSum">0</td>
                    <td id="totalRateSum">0%</td>
                    <script>for(let i=0; i<15; i++) document.write(`<td id="col-sum-${i}" style="font-weight: 800;">0</td>`);</script>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="settings-grid">
        <div class="card full-width-card">
            <h3>2. 신제품 상세 목록</h3>
            <div style="overflow-y: auto; max-height: 400px;">
                <table id="productSetupTable">
                    <thead><tr><th>삭제</th><th>IP</th><th>출시일</th><th>테마</th><th>등급</th><th>물량</th><th>주차</th><th>전개</th><th>합계</th></tr></thead>
                    <tbody id="productSetupBody"></tbody>
                </table>
            </div>
            <button onclick="addProductRow()">+ 제품 추가</button>
        </div>

        <div class="card full-width-card">
            <h3>4. 프로모션 목록</h3>
            <table id="promotionSetupTable">
                <thead><tr><th>삭제</th><th>명칭</th><th>스킴</th><th>시작일</th><th>종료일</th><th>주차</th><th>전개</th><th>금액</th></tr></thead>
                <tbody id="promotionSetupBody"></tbody>
            </table>
            <button onclick="addPromoRow()">+ 프로모션 추가</button>
        </div>
    </div>

    <script>
        const WEEKS = [18, 19, 20, 21, 22];
        const WEEK_DATES = { 18: "5/1~5/3", 19: "5/4~5/10", 20: "5/11~5/17", 21: "5/18~5/24", 22: "5/25~5/31" };
        const GRADE_RATES = { 'A': 0.8, 'B': 0.6, 'C': 0.4, 'D': 0.2 };

        // 1단계: 실제 실적(ACTUAL) 수치 고정
        const ACTUAL_VALUES = {
            "홍대_18": 55, "홍대_19": 42, "홍대_20": 113,
            "명동_18": 110, "명동_19": 91, "명동_20": 117,
            "성수_18": 91, "성수_19": 34, "성수_20": 15,
            "분당스퀘어_18": 2, "분당스퀘어_19": 2, "분당스퀘어_20": 1
        };

        // 2단계: 신제품 목록 고정
        const INITIAL_PRODUCTS = [
            { ip: "BT21", date: "2026-05-01", theme: "스노우피크", grade: "D", totalQty: 24, week: 18, stores: ["홍대", "명동"] },
            { ip: "JUG", date: "2026-05-07", theme: "JG OFFICE", grade: "D", totalQty: 163, week: 19, stores: ["홍대", "명동"] },
            { ip: "JUG", date: "2026-05-07", theme: "JG 스튜디오천재", grade: "D", totalQty: 42, week: 19, stores: ["홍대", "명동"] },
            { ip: "JUG", date: "2026-05-07", theme: "쓰루웨이", grade: "D", totalQty: 68, week: 19, stores: ["홍대", "명동"] },
            { ip: "MULTI", date: "2026-05-08", theme: "산리오캐릭터즈", grade: "D", totalQty: 18, week: 19, stores: ["홍대", "명동"] },
            { ip: "ZNF", date: "2026-05-08", theme: "케이스티파이", grade: "D", totalQty: 48, week: 19, stores: ["홍대", "명동"] },
            { ip: "BT21", date: "2026-05-12", theme: "BASIC", grade: "D", totalQty: 17, week: 20, stores: ["홍대", "명동"] },
            { ip: "GS", date: "2026-05-15", theme: "LIYUE", grade: "C", totalQty: 270, week: 20, stores: ["홍대"] },
            { ip: "ZNF", date: "2026-05-15", theme: "로이체", grade: "D", totalQty: 19, week: 20, stores: ["홍대", "명동"] },
            { ip: "BT21", date: "2026-05-21", theme: "BEYOND THE JOURNEY", grade: "B", totalQty: 245, week: 21, stores: ["홍대", "명동"] },
            { ip: "MULTI", date: "2026-05-22", theme: "실바니안패밀리", grade: "C", totalQty: 330, week: 21, stores: ["성수"] },
            { ip: "ZNF", date: "2026-05-19", theme: "오센트", grade: "D", totalQty: 11, week: 21, stores: ["홍대", "명동"] },
            { ip: "JUG", date: "2026-05-27", theme: "JG 스튜디오천재 2차", grade: "D", totalQty: 30, week: 22, stores: ["홍대", "명동"] },
            { ip: "NCT WISH", date: "2026-05-29", theme: "팝업_WISHNINI'S HOUSE", grade: "A", totalQty: 580, week: 22, stores: ["홍대"] },
            { ip: "B&F", date: "", theme: "25 시티에디션", grade: "D", totalQty: 4, week: "", stores: ["홍대", "명동"] },
            { ip: "B&F", date: "", theme: "LF_DRINKWARE", grade: "D", totalQty: 25, week: "", stores: ["홍대", "명동"] },
            { ip: "B&F", date: "", theme: "코코도르", grade: "D", totalQty: 8, week: "", stores: ["홍대", "명동"] },
            { ip: "JUG", date: "", theme: "JG DRINKWARE", grade: "D", totalQty: 21, week: "", stores: ["홍대", "명동"] }
        ];

        // 3단계: 프로모션 목록 고정
        const INITIAL_PROMOTIONS = [
            { name: "가정의달 프렌즈픽", scheme: "키링 2+1", start: "2026-05-01", end: "2026-05-10", week: 18, amount: 54, stores: ["홍대", "명동"] },
            { name: "뽑기 / 증정", scheme: "미디어추억뽑기", start: "2026-05-15", end: "2026-05-24", week: 20, amount: 20, stores: ["명동"] },
            { name: "The lucky last", scheme: "up to 70%", start: "2026-05-01", end: "2026-05-31", week: 18, amount: 5, stores: ["분당스퀘어"] }
        ];

        const STORES = [
            { name: "홍대", target: 963, base: 500 },
            { name: "명동", target: 524, base: 250 },
            { name: "성수", target: 254, base: 120 },
            { name: "분당스퀘어", target: 36, base: 20 }
        ];

        function getISOWeek(dateString) {
            if (!dateString) return null;
            const date = new Date(dateString);
            const target = new Date(date.valueOf());
            const dayNr = (date.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay() + 7) % 7));
            return 1 + Math.ceil((firstThursday - target) / 604800000);
        }

        function updateAll() {
            const kpiBody = document.getElementById('kpiBody');
            kpiBody.innerHTML = '';
            
            let storeNewProdFcstMap = {};
            let storePromoFcstMap = {};
            STORES.forEach(s => {
                storeNewProdFcstMap[s.name] = {}; storePromoFcstMap[s.name] = {};
                WEEKS.forEach(w => { storeNewProdFcstMap[s.name][w] = 0; storePromoFcstMap[s.name][w] = 0; });
            });

            // 신제품 FCST 계산 (71.4% / 28.6% 감쇠 적용)
            const productRows = document.querySelectorAll('#productSetupBody tr');
            productRows.forEach(row => {
                const grade = row.querySelector('.p-grade').value;
                const totalQty = parseFloat(row.querySelector('.p-total-qty').value) || 0;
                const week = parseInt(row.querySelector('.p-week').value);
                const amount = totalQty * (GRADE_RATES[grade] || 1.0);
                
                let selected = [];
                if (row.querySelector('.p-store-hd').checked) selected.push("홍대");
                if (row.querySelector('.p-store-md').checked) selected.push("명동");
                if (row.querySelector('.p-store-ss').checked) selected.push("성수");
                if (row.querySelector('.p-store-bd').checked) selected.push("분당스퀘어");

                if (WEEKS.includes(week) && selected.length > 0) {
                    const share = amount / selected.length;
                    selected.forEach(st => {
                        storeNewProdFcstMap[st][week] += share * 0.7143;
                        if (WEEKS.includes(week + 1)) storeNewProdFcstMap[st][week + 1] += share * 0.2857;
                    });
                }
            });

            // 프로모션 FCST 계산
            const promoRows = document.querySelectorAll('#promotionSetupBody tr');
            promoRows.forEach(row => {
                const amount = parseFloat(row.querySelector('.promo-amount').value) || 0;
                const week = parseInt(row.querySelector('.promo-week').value);
                let selected = [];
                if (row.querySelector('.promo-store-hd').checked) selected.push("홍대");
                if (row.querySelector('.promo-store-md').checked) selected.push("명동");
                if (row.querySelector('.promo-store-ss').checked) selected.push("성수");
                if (row.querySelector('.promo-store-bd').checked) selected.push("분당스퀘어");

                if (WEEKS.includes(week) && selected.length > 0) {
                    const share = amount / selected.length;
                    selected.forEach(st => {
                        storePromoFcstMap[st][week] += share * 0.7143;
                        if (WEEKS.includes(week + 1)) storePromoFcstMap[st][week + 1] += share * 0.2857;
                    });
                }
            });

            let grandFcst = 0, grandAct = 0, grandTarget = 0;
            let colTotals = new Array(15).fill(0);

            STORES.forEach(store => {
                let sFcstTotal = 0, sActTotal = 0;
                let rowHtml = `<tr><td style="font-weight:700;">${store.name}</td><td>${store.target}</td><td id="tf-${store.name}">0</td><td id="ta-${store.name}">0</td><td id="tr-${store.name}">0%</td>`;
                
                WEEKS.forEach((w, i) => {
                    let base = (w === 18) ? store.base * (3/31) : store.base * (7/31);
                    let event = storeNewProdFcstMap[store.name][w] + storePromoFcstMap[store.name][w];
                    
                    // 홍대/명동 7:3 보정 (선택 사항)
                    if (store.name === "홍대" || store.name === "명동") event = event * 1.0; 

                    const f = Math.round(base + event);
                    const a = ACTUAL_VALUES[`${store.name}_${w}`] || 0;
                    const r = f > 0 ? Math.round((a/f)*100) : 0;

                    rowHtml += `<td>${f}</td><td>${a}</td><td class="rate-cell">${r}%</td>`;
                    sFcstTotal += f; sActTotal += a;
                    colTotals[i*3] += f; colTotals[i*3+1] += a;
                });

                kpiBody.innerHTML += rowHtml + `</tr>`;
                document.getElementById(`tf-${store.name}`).innerText = sFcstTotal;
                document.getElementById(`ta-${store.name}`).innerText = sActTotal;
                document.getElementById(`tr-${store.name}`).innerText = sFcstTotal > 0 ? Math.round((sActTotal/sFcstTotal)*100) + "%" : "0%";
                grandFcst += sFcstTotal; grandAct += sActTotal; grandTarget += store.target;
            });

            document.getElementById('totalTarget').innerText = grandTarget;
            document.getElementById('totalFcstSum').innerText = grandFcst;
            document.getElementById('totalActualSum').innerText = grandAct;
            document.getElementById('totalRateSum').innerText = grandFcst > 0 ? Math.round((grandAct/grandFcst)*100) + "%" : "0%";
            
            WEEKS.forEach((w, i) => {
                document.getElementById(`col-sum-${i*3}`).innerText = colTotals[i*3];
                document.getElementById(`col-sum-${i*3+1}`).innerText = colTotals[i*3+1];
                document.getElementById(`col-sum-${i*3+2}`).innerText = colTotals[i*3] > 0 ? Math.round((colTotals[i*3+1]/colTotals[i*3])*100) + "%" : "0%";
            });
        }

        function addProductRow(p={}) {
            const tbody = document.getElementById('productSetupBody');
            const row = `<tr>
                <td><button class="delete-btn" onclick="this.closest('tr').remove(); updateAll();">X</button></td>
                <td><input type="text" class="p-ip" value="${p.ip || ''}" style="width:50px;"></td>
                <td><input type="date" value="${p.date || ''}" onchange="this.closest('tr').querySelector('.p-week').value=getISOWeek(this.value); updateAll();"></td>
                <td><input type="text" value="${p.theme || ''}" style="width:100px;"></td>
                <td><select class="p-grade" onchange="updateAll()">
                    <option value="A" ${p.grade=='A'?'selected':''}>A(80%)</option>
                    <option value="B" ${p.grade=='B'?'selected':''}>B(60%)</option>
                    <option value="C" ${p.grade=='C'?'selected':''}>C(40%)</option>
                    <option value="D" ${p.grade=='D'?'selected':''}>D(20%)</option>
                </select></td>
                <td><input type="number" class="p-total-qty" value="${p.totalQty || 0}" style="width:50px;" oninput="updateAll()"></td>
                <td><input type="number" class="p-week" value="${p.week || ''}" style="width:30px;" readonly></td>
                <td>
                    <input type="checkbox" class="p-store-hd" ${p.stores?.includes("홍대")?'checked':''} onchange="updateAll()">홍
                    <input type="checkbox" class="p-store-md" ${p.stores?.includes("명동")?'checked':''} onchange="updateAll()">명
                    <input type="checkbox" class="p-store-ss" ${p.stores?.includes("성수")?'checked':''} onchange="updateAll()">성
                    <input type="checkbox" class="p-store-bd" ${p.stores?.includes("분당스퀘어")?'checked':''} onchange="updateAll()">분
                </td>
                <td><input type="number" value="0" style="width:50px;" readonly></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        function addPromoRow(p={}) {
            const tbody = document.getElementById('promotionSetupBody');
            const row = `<tr>
                <td><button class="delete-btn" onclick="this.closest('tr').remove(); updateAll();">X</button></td>
                <td><input type="text" value="${p.name || ''}"></td>
                <td><input type="text" value="${p.scheme || ''}"></td>
                <td><input type="date" value="${p.start || ''}" onchange="this.closest('tr').querySelector('.promo-week').value=getISOWeek(this.value); updateAll();"></td>
                <td><input type="date" value="${p.end || ''}"></td>
                <td><input type="number" class="promo-week" value="${p.week || ''}" style="width:40px;" readonly></td>
                <td>
                    <input type="checkbox" class="promo-store-hd" ${p.stores?.includes("홍대")?'checked':''} onchange="updateAll()">홍
                    <input type="checkbox" class="promo-store-md" ${p.stores?.includes("명동")?'checked':''} onchange="updateAll()">명
                    <input type="checkbox" class="promo-store-bd" ${p.stores?.includes("분당스퀘어")?'checked':''} onchange="updateAll()">분
                </td>
                <td><input type="number" class="promo-amount" value="${p.amount || 0}" style="width:60px;" oninput="updateAll()"></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        function resetAllData() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            INITIAL_PRODUCTS.forEach(p => addProductRow(p));
            INITIAL_PROMOTIONS.forEach(p => addPromoRow(p));
            updateAll();
        };
    </script>
</body>
</html>
